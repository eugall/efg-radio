<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EuGall Tactical Radio Dashboard</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/G5iM8qP.png">

<style>
:root {
  --tactical-green: #00FF00; /* Neon/Tactical Green */
  --tactical-green-dim: #007700;
  --tactical-black: #1A1A1A; /* Dark Gray/Black */
  --tactical-background: #000000;
  --panel-border: 1px solid var(--tactical-green-dim);
}

body {
margin: 0;
padding: 0;
background-color: var(--tactical-background);
color: var(--tactical-green);
font-family: 'Courier New', Courier, monospace; /* Monospaced font */
display: flex;
flex-direction: column;
align-items: center;
height: 100vh;
overflow-x: hidden;
}

/* --- Main Dashboard Area --- */
#main-radio-console {
width: 100%;
max-width: 480px;
padding: 10px;
border-bottom: var(--panel-border);
text-align: center;
}

#frequency-display {
font-size: 2em;
letter-spacing: 2px;
margin-bottom: 5px;
text-shadow: 0 0 10px var(--tactical-green);
}

#signal-bars {
display: flex;
justify-content: center;
gap: 2px;
margin-top: 5px;
}

.signal-bar {
width: 10px;
height: 15px;
background-color: var(--tactical-green-dim);
opacity: 0.3;
transition: opacity 0.2s ease, height 0.2s ease;
}

.signal-bar.active {
opacity: 1;
box-shadow: 0 0 5px var(--tactical-green);
}

/* --- 5-Channel Vertical Stack --- */
#channel-stack {
width: 100%;
max-width: 480px;
padding: 10px;
display: flex;
flex-direction: column;
gap: 15px; /* Space between channels */
}

.radio-channel {
background-color: var(--tactical-black);
border: var(--panel-border);
padding: 10px;
border-radius: 5px;
display: grid;
grid-template-columns: 40px 1fr auto;
align-items: center;
gap: 10px;
transition: border-color 0.2s ease;
}

.radio-channel.active {
border-color: var(--tactical-green);
box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
}

.channel-id-group {
text-align: center;
}

.channel-id {
font-size: 0.8em;
color: var(--tactical-green-dim);
}

.active-led {
width: 8px;
height: 8px;
background-color: #333;
border-radius: 50%;
margin: 2px auto;
transition: background-color 0.2s ease;
}

.radio-channel.active .active-led {
background-color: var(--tactical-green);
box-shadow: 0 0 5px var(--tactical-green);
}

.station-label {
font-size: 1.1em;
font-weight: bold;
color: white;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.control-group {
display: flex;
align-items: center;
gap: 10px;
}

.ctrl-btn {
background: none;
border: none;
color: var(--tactical-green);
font-size: 1.5em;
cursor: pointer;
padding: 5px;
opacity: 0.7;
transition: opacity 0.2s ease;
}

.ctrl-btn:hover, .ctrl-btn:focus {
opacity: 1;
outline: none;
}

.vol-slider {
width: 80px;
-webkit-appearance: none;
background: var(--tactical-green-dim);
height: 3px;
outline: none;
opacity: 0.7;
transition: opacity 0.2s ease;
}

.vol-slider::-webkit-slider-thumb {
-webkit-appearance: none;
appearance: none;
width: 10px;
height: 10px;
background: var(--tactical-green);
cursor: pointer;
border-radius: 50%;
}

/* --- Audio Visualizer --- */
#visualizer-canvas {
width: 100%;
height: 40px;
margin-top: 10px;
background-color: #111;
}
</style>
</head>
<body>

<div id="main-radio-console">
<div id="frequency-display">EuGall-RAD // COMM</div>
<div id="signal-bars">
<div class="signal-bar"></div>
<div class="signal-bar"></div>
<div class="signal-bar"></div>
<div class="signal-bar"></div>
<div class="signal-bar"></div>
<div class="signal-bar"></div>
</div>
<canvas id="visualizer-canvas"></canvas>
</div>

<div id="channel-stack">

<div class="radio-channel" id="channel-1">
<div class="channel-id-group">
<div class="channel-id">01</div>
<div class="active-led"></div>
</div>
<div class="station-label">Raysland Radio</div>
<div class="control-group">
<button class="ctrl-btn play" onclick="playStation(1)">▷</button>
<button class="ctrl-btn stop" onclick="stopStation(1)">□</button>
<input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.8" oninput="setVolume(1, this.value)">
</div>
</div>

<div class="radio-channel" id="channel-2">
<div class="channel-id-group">
<div class="channel-id">02</div>
<div class="active-led"></div>
</div>
<div class="station-label">Love Classic</div>
<div class="control-group">
<button class="ctrl-btn play" onclick="playStation(2)">▷</button>
<button class="ctrl-btn stop" onclick="stopStation(2)">□</button>
<input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.8" oninput="setVolume(2, this.value)">
</div>
</div>

<div class="radio-channel" id="channel-3">
<div class="channel-id-group">
<div class="channel-id">03</div>
<div class="active-led"></div>
</div>
<div class="station-label">Retro Cebu</div>
<div class="control-group">
<button class="ctrl-btn play" onclick="playStation(3)">▷</button>
<button class="ctrl-btn stop" onclick="stopStation(3)">□</button>
<input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.8" oninput="setVolume(3, this.value)">
</div>
</div>

<div class="radio-channel" id="channel-4">
<div class="channel-id-group">
<div class="channel-id">04</div>
<div class="active-led"></div>
</div>
<div class="station-label">Sano Radio</div>
<div class="control-group">
<button class="ctrl-btn play" onclick="playStation(4)">▷</button>
<button class="ctrl-btn stop" onclick="stopStation(4)">□</button>
<input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.8" oninput="setVolume(4, this.value)">
</div>
</div>

<div class="radio-channel" id="channel-5">
<div class="channel-id-group">
<div class="channel-id">05</div>
<div class="active-led"></div>
</div>
<div class="station-label">IFM Radio</div>
<div class="control-group">
<button class="ctrl-btn play" onclick="playStation(5)">▷</button>
<button class="ctrl-btn stop" onclick="stopStation(5)">□</button>
<input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.8" oninput="setVolume(5, this.value)">
</div>
</div>

</div>

<script>
// --- Station Data (Your Collected URLs) ---
const stations = {
1: {
name: "RAYSLAND_RADIO // mngr Eugene G.", url: "https://stream.zeno.fm/z7fgtpslunjuv", type: "icecast" },
2: {
name: "LOVE_CLASSICS // Brazil based", url: "https://strm112.1.fm/loveclassics_mobile_mp3", type: "mp3" },
3: {
name: "RETRO_CEBU // mngr Alvin B.", url: "http://fr1.amfmph.com:8128/stream", type: "icecast" },
4: {
name: "SANO RADIO // mngr Nelson M.", url: "https://stream.zeno.fm/xj1zhrcwnkatv", type: "zeno" },
5: {
name: "IFM_RADIO // mngr Atty. Rufil B.", url: "https://magic.radioca.st/stream", type: "radiocast" }
};

let currentActiveChannel = null;
let audioContext = null;
let analyser = null;
let sourceNode = null;
let dataArray = null;

const freqDisplay = document.getElementById("frequency-display");
const signalBars = document.querySelectorAll(".signal-bar");
const canvas = document.getElementById("visualizer-canvas");
const ctx = canvas.getContext("2d");

// --- Core Functions (Play, Stop, Volume) ---

function playStation(channelId) {
// 1. If another channel is active, stop it
if (currentActiveChannel && currentActiveChannel !== channelId) {
stopStation(currentActiveChannel);
}

// 2. Set new current active channel
currentActiveChannel = channelId;
const stationData = stations[channelId];
const channelElement = document.getElementById(`channel-${channelId}`);

// 3. Update the Main Console (Frequency Display)
freqDisplay.textContent = stationData.name;
activateSignalBars(true);

// 4. Update UI (Visual Active Indicators)
channelElement.classList.add("active");

// 5. Start the Audio
// We use a clean way to manage the 'restricted' or complex nature of some streams
const audioElement = document.createElement("audio");
audioElement.id = `audio-channel-${channelId}`;
audioElement.src = stationData.url;
audioElement.crossOrigin = "anonymous"; // Important for visualizer
document.body.appendChild(audioElement);

audioElement.play().catch(error => {
console.error("Audio play failed:", error);
freqDisplay.textContent = "ERR_CONNECTION";
activateSignalBars(false);
});

// 6. Hook up the Audio Visualizer
startVisualizer(audioElement);
}

function stopStation(channelId) {
if (currentActiveChannel !== channelId) return;

// 1. Stop the audio
const audioElement = document.getElementById(`audio-channel-${channelId}`);
if (audioElement) {
audioElement.pause();
audioElement.remove(); // Clean up the DOM element
}

// 2. Update the Main Console
freqDisplay.textContent = "EuGall-RAD // STANDBY";
activateSignalBars(false);

// 3. Update UI
const channelElement = document.getElementById(`channel-${channelId}`);
if (channelElement) {
channelElement.classList.remove("active");
}

currentActiveChannel = null;

// 4. Stop visualization
if (audioContext) audioContext.close();
audioContext = null;
}

function setVolume(channelId, value) {
const audioElement = document.getElementById(`audio-channel-${channelId}`);
if (audioElement) {
audioElement.volume = value;
}
}

// --- Decoration: Signal Strength & Visualizer ---

function activateSignalBars(active) {
signalBars.forEach(bar => {
if (active) {
bar.classList.add("active");
} else {
bar.classList.remove("active");
}
});
}

function startVisualizer(audioElement) {
if (!audioContext) {
audioContext = new (window.AudioContext || window.webkitAudioContext)();
}

analyser = audioContext.createAnalyser();
sourceNode = audioContext.createMediaElementSource(audioElement);
sourceNode.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize = 64;
const bufferLength = analyser.frequencyBinCount;
dataArray = new Uint8Array(bufferLength);

function draw() {
if (!currentActiveChannel) return; // Stop drawing if stopped

requestAnimationFrame(draw);
analyser.getByteFrequencyData(dataArray);

ctx.fillStyle = "rgb(17, 17, 17)"; // Dark bg
ctx.fillRect(0, 0, canvas.width, canvas.height);

const barWidth = (canvas.width / bufferLength) * 1.5;
let barHeight;
let x = 0;

for (let i = 0; i < bufferLength; i++) {
barHeight = dataArray[i];

ctx.fillStyle = `rgb(0, ${Math.min(255, barHeight + 50)}, 0)`; // Varies green
ctx.fillRect(x, canvas.height - barHeight / 2, barWidth, barHeight / 2);

x += barWidth + 1;
}
}
draw();
}
</script>
</div>
</body>
</html>
